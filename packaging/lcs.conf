# /etc/lcs/lcs.conf
#
# LCS configuration is INI-like. Lines starting with "#" or ";" are comments,
# and inline comments after values are also supported.
#
# This packaged file is a safe template. It is intentionally fully commented
# out, so lcsd will not start managing resources until you edit it.
#
# Use the same cluster definition on every node, changing only:
#
#   [cluster]
#   node = ...
#
# Build with `make WITH_SYSTEMD=1` if you use [service NAME] resources.

#[cluster]
## REQUIRED: cluster name. Peers reject nodes from a different cluster.
#name = example
#
## REQUIRED: local node name. Change this on each host to match one [node NAME].
#node = node1
#
## OPTIONAL: local bind address for daemon-to-daemon TCP.
## Default: empty, which binds on all local addresses.
#bind = 192.0.2.11
#
## OPTIONAL: daemon-to-daemon TCP port.
## Default: 3322.
#port = 3322
#
## OPTIONAL: local Unix socket path used by the lcs CLI.
## Default: /run/lcs/lcsd.sock.
#socket = /run/lcs/lcsd.sock
#
## OPTIONAL: pidfile path used only with --daemonize.
## Default: empty, which disables pidfile creation.
#pidfile = /run/lcs/lcsd.pid
#
## OPTIONAL: shared cluster secret checked during peer handshake.
## This is not transport encryption; keep the cluster network isolated.
#secret = change-me-shared-secret
#
## OPTIONAL: majority lease duration in milliseconds.
## Default: 5000.
#lease_ms = 5000
#
## OPTIONAL: lease renewal interval in milliseconds.
## Must be lower than lease_ms.
## Default: 1000.
#renew_ms = 1000
#
## OPTIONAL: peer liveness timeout in milliseconds.
## Default: 5000.
#peer_timeout_ms = 5000
#
## OPTIONAL: number of address-conflict probes before VIP activation.
## Default: 3.
#probe_count = 3
#
## OPTIONAL: timeout for each conflict probe in milliseconds.
## Default: 300.
#probe_timeout_ms = 300
#
## OPTIONAL: maximum runtime for each resource hook in milliseconds.
## Default: 5000.
#hook_timeout_ms = 5000
#
## OPTIONAL: send daemon logs to syslog.
## Default: true.
#syslog = true
#
## OPTIONAL: VIP address management backend: ip or netlink.
## Default: ip.
#vip_backend = ip
#
## OPTIONAL: enable Prometheus metrics HTTP endpoint.
## Default: true.
#metrics = true
#metrics_bind = 127.0.0.1
#metrics_port = 9120

#[node node1]
## REQUIRED: node role: full-member or quorum-only.
## full-member can vote, hold leases, and run resources.
## quorum-only can vote and hold lease state but never activates resources.
#role = full-member
#
## REQUIRED: peer address for daemon-to-daemon TCP.
#address = 192.0.2.11
#
## OPTIONAL: per-node peer TCP port.
## Default: the [cluster] port value.
#port = 3322

#[node node2]
#role = full-member
#address = 192.0.2.12

#[node node3]
#role = quorum-only
#address = 192.0.2.13

#[group public]
## REQUIRED for group sections: keep-together or anti-affinity.
#type = keep-together
#
## REQUIRED for group sections: strict or best-effort.
#mode = best-effort

#[vip public_v4]
## REQUIRED: VIP address in IPv4 or IPv6 CIDR form.
#address = 198.51.100.50/24
#
## REQUIRED: Linux interface used for this VIP.
#interface = eth0
#
## OPTIONAL: placement group name.
#group = public
#
## OPTIONAL: positive integer priority inside the group.
#priority = 200
#
## OPTIONAL: preferred full-member node.
#home_node = node1
#
## OPTIONAL: hooks. Paths must be empty or absolute.
#pre_start = /usr/local/libexec/lcs/public-pre-start
#post_start = /usr/local/libexec/lcs/public-post-start
#pre_stop = /usr/local/libexec/lcs/public-pre-stop
#post_stop = /usr/local/libexec/lcs/public-post-stop

#[service app]
## REQUIRED: systemd .service unit managed through D-Bus.
#systemd_unit = app.service
#
## OPTIONAL: service resources use the same placement controls and hooks.
#group = public
#priority = 100
#home_node = node1
