[cluster]
name = demo
node = node1
bind = 127.0.0.1
port = 3322
socket = /tmp/lcsd.sock
syslog = true
vip_backend = ip
metrics = true
metrics_bind = 127.0.0.1
metrics_port = 9120
lease_ms = 5000
renew_ms = 1000
peer_timeout_ms = 5000
probe_count = 3
probe_timeout_ms = 300
hook_timeout_ms = 5000

[node node1]
role = full-member
address = 127.0.0.1

[vip vip1]
address = 127.0.0.200/32
interface = lo
