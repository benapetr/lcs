[cluster]
name = service-demo
node = b

[node a]
role = full-member
address = 192.168.0.1

[node b]
role = full-member
address = 192.168.0.2

[node c]
role = quorum-only
address = 192.168.0.3

[group app]
type = keep-together
mode = best-effort

[service web]
group = app
priority = 100
home_node = a
systemd_unit = nginx.service
