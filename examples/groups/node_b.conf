[cluster]
name = demo
node = b
bind = 192.168.0.2
socket = /run/lcs/lcsd.sock

[node a]
role = full-member
address = 192.168.0.1

[node b]
role = full-member
address = 192.168.0.2

[node c]
role = quorum-only
address = 192.168.0.3

[group vips]
type = keep-together
mode = best-effort

[group anti]
type = anti-affinity
mode = strict

[vip vip1]
# Change this to "anti" to try strict anti-affinity placement.
group = vips
priority = 2
address = 192.168.0.4/24
interface = eth0

[vip vip2]
# Lower numbers are higher priority. This VIP anchors keep-together rebalance.
group = vips
priority = 1
address = 192.168.0.5/24
interface = eth0
