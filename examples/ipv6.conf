[cluster]
name = demo-v6
node = node1
bind = 2001:db8:10::11
port = 3322
socket = /tmp/lcsd-v6.sock
syslog = true
vip_backend = ip
metrics = true
metrics_bind = ::1
metrics_port = 9120
lease_ms = 5000
renew_ms = 1000
peer_timeout_ms = 5000
probe_count = 3
probe_timeout_ms = 300
hook_timeout_ms = 5000

# Replace 2001:db8:10::/64 with your real L2 IPv6 subnet.
# On each node, set [cluster] node and bind to the local node.
[node node1]
role = full-member
address = 2001:db8:10::11

[node node2]
role = full-member
address = 2001:db8:10::12

[node node3]
role = quorum-only
address = 2001:db8:10::13

[vip vip1]
address = 2001:db8:10::100/64
interface = eth0
