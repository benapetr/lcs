[cluster]
name = public-demo
node = c

[node a]
role = full-member
address = 192.0.2.11

[node b]
role = full-member
address = 192.0.2.12

[node c]
role = quorum-only
address = 192.0.2.13

[group public-vips]
type = keep-together
mode = best-effort

[vip vip1]
group = public-vips
priority = 2
address = 198.51.100.50/24
interface = eth0
post_start = /usr/local/sbin/vip-public-up.sh
post_stop = /usr/local/sbin/vip-public-down.sh

[vip vip1_v6]
group = public-vips
priority = 1
address = 2001:db8:100::50/64
interface = eth0
