[cluster]
name = demo
node = node3
bind = 127.0.0.1
port = 3333
socket = /tmp/lcs-node3.sock
syslog = true
vip_backend = ip
lease_ms = 5000
renew_ms = 1000
peer_timeout_ms = 5000
probe_count = 3
probe_timeout_ms = 300

[node node1]
role = full-member
address = 127.0.0.1
port = 3331

[node node2]
role = full-member
address = 127.0.0.1
port = 3332

[node node3]
role = quorum-only
address = 127.0.0.1
port = 3333

[vip vip1]
address = 127.0.0.200/32
interface = lo
